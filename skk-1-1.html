<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKK - Pencapaian Pramuka Garuda</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="page-content">

    <header class="navbar">
        <div class="logo-text">
            PENCAPAIAN PRAMUKA GARUDA
        </div>

        <a href="index.html" class="home-link" aria-label="Kembali ke beranda">
            <img src="images/home.png" alt="" width="32">
        </a>
    </header>
 
    <div class="bio-container">

        <a href="skk-dan-tkk.html" class="back-button">
            <span aria-hidden="true">&#8592;</span> Kembali
        </a>

        <h1 id="skkTitle" class="bio-title">Memuat...</h1>

        <div class="section-banner section-banner--dok">
            Tanda Lulus
        </div>

        <div class="tanda-lulus-grid" id="tandaLulusGrid"></div>

        <div class="section-banner section-banner--dok">
            Dokumentasi
        </div>

        <section class="slider-section">

            <div class="slider" data-autoplay="4000">
                <div class="slides" id="dokSlides"></div>

                <button class="prev" aria-label="Foto sebelumnya">&#10094;</button>
                <button class="next" aria-label="Foto berikutnya">&#10095;</button>
                <button class="slide-toggle" aria-label="Hentikan slideshow">&#10073;&#10073;</button>
            </div>

            <p class="slide-counter">
                <span class="slide-counter-current">1</span> / <span class="slide-counter-total">1</span>
            </p>

            <div class="slide-progress">
                <div class="slide-progress-fill"></div>
            </div>

        </section>

    </div>

    <!-- skrip.js mengisi judul + gambar dari skkData berdasarkan ?id=...,
         baru lalu slider.js menyalakan slider Dokumentasi-nya -->
    <script src="skrip.js"></script>
    <script src="slider.js"></script>

</body>
</html>
