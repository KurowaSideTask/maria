<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keikutsertaan Kegiatan</title>
  <link rel="stylesheet" href="style.css">

</head>
<body class="page-content">

  <div id="navbar-container"></div>

  <div style="padding: 20px 20px 60px;">
    <h1 class="page-title">KEIKUTSERTAAN KEGIATAN</h1>

    <!-- JOTA JOTI -->
    <div class="kegiatan-section">
      <div class="section-banner banner-blue">JOTA JOTI</div>
      <div class="slider" data-slider>
        <button class="pause-btn" onclick="togglePause(this)">⏸</button>
        <div class="slides">
          <div class="slide active"><img src="images/jotajoti-1.webp" alt="Jota Joti 1"></div>
          <div class="slide"><img src="images/jotajoti-2.webp" alt="Jota Joti 2"></div>
          <!-- tambah slide sesuai kebutuhan -->
        </div>
        <button class="prev" onclick="changeSlide(this, -1)">&#8249;</button>
        <button class="next" onclick="changeSlide(this, 1)">&#8250;</button>
        <div class="dot-row"></div>
        <div class="slide-counter"></div>
      </div>
    </div>
