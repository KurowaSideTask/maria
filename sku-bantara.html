<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKU Bantara &amp; Laksana - Pencapaian Pramuka Garuda</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="page-content">

    <!-- HEADER (sticky) -->
    <header class="navbar">
        <div class="logo-text">
            PENCAPAIAN PRAMUKA GARUDA
        </div>

        <a href="index.html" class="home-link" aria-label="Kembali ke beranda">
            <img src="images/home.png" alt="" width="32">
        </a>
    </header>

    <!-- CONTENT -->
    <div class="bio-container">

        <a href="daftarskuskk.html" class="back-button">
            <span aria-hidden="true">&#8592;</span> Kembali
        </a>

        <!-- Buku SKU Bantara -->
        <section class="slider-section">

            <div class="section-banner section-banner--sku">
                Buku SKU Bantara
            </div>

            <div class="slider" data-autoplay="4000">
                <div class="slides">

                    <div class="slide active">
                        <img src="images/sku-bantara-1.jpg" alt="Buku SKU Bantara halaman 1">
                    </div>

                    <div class="slide">
                        <img src="images/sku-bantara-2.jpg" alt="Buku SKU Bantara halaman 2">
                    </div>

                    <div class="slide">
                        <img src="images/sku-bantara-3.jpg" alt="Buku SKU Bantara halaman 3">
                    </div>

                    <!-- GANTI: tambah halaman lain dengan menyalin blok .slide di atas -->

                </div>

                <button class="prev" aria-label="Halaman sebelumnya">&#10094;</button>
                <button class="next" aria-label="Halaman berikutnya">&#10095;</button>
                <button class="slide-toggle" aria-label="Hentikan slideshow">&#10073;&#10073;</button>
            </div>

            <p class="slide-counter">
                <span class="slide-counter-current">1</span> / <span class="slide-counter-total">3</span>
            </p>

        </section>

        <!-- Buku SKU Laksana -->
        <section class="slider-section">

            <div class="section-banner section-banner--sku">
                Buku SKU Laksana
            </div>

            <div class="slider" data-autoplay="4000">
                <div class="slides">

                    <div class="slide active">
                        <img src="images/sku-laksana-1.jpg" alt="Buku SKU Laksana halaman 1">
                    </div>

                    <div class="slide">
                        <img src="images/sku-laksana-2.jpg" alt="Buku SKU Laksana halaman2">
                    </div>

                    <div class="slide">
                        <img src="images/sku-laksana-3.jpg" alt="Buku SKU Laksana halaman 3">
                    </div>

                    <!-- GANTI: tambah halaman lain dengan menyalin blok .slide di atas -->

                </div>

                <button class="prev" aria-label="Halaman sebelumnya">&#10094;</button>
                <button class="next" aria-label="Halaman berikutnya">&#10095;</button>
                <button class="slide-toggle" aria-label="Hentikan slideshow">&#10073;&#10073;</button>
            </div>

            <p class="slide-counter">
                <span class="slide-counter-current">1</span> / <span class="slide-counter-total">3</span>
            </p>

        </section>

        <!-- Dokumentasi Kenaikan Tingkat Bantara -->
        <section class="slider-section">

            <div class="section-banner section-banner--dok">
                Dokumentasi Kenaikan Tingkat Bantara
            </div>

            <div class="slider" data-autoplay="4000">
                <div class="slides">

                    <div class="slide active">
                        <img src="images/dok-bantara-1.jpg" alt="Dokumentasi kenaikan tingkat Bantara 1">
                    </div>

                    <div class="slide">
                        <img src="images/dok-bantara-2.jpg" alt="Dokumentasi kenaikan tingkat Bantara 2">
                    </div>

                    <div class="slide">
                        <img src="images/dok-bantara-3.jpg" alt="Dokumentasi kenaikan tingkat Bantara 3">
                    </div>

                    <!-- GANTI: tambah foto lain dengan menyalin blok .slide di atas -->

                </div>

                <button class="prev" aria-label="Foto sebelumnya">&#10094;</button>
                <button class="next" aria-label="Foto berikutnya">&#10095;</button>
                <button class="slide-toggle" aria-label="Hentikan slideshow">&#10073;&#10073;</button>
            </div>

            <p class="slide-counter">
                <span class="slide-counter-current">1</span> / <span class="slide-counter-total">3</span>
            </p>

        </section>

        <!-- Dokumentasi Kenaikan Tingkat Laksana -->

            <div class="section-banner section-banner--dok">
                Dokumentasi Kenaikan Tingkat Laksana
            </div>

            <div class="slider" data-autoplay="4000">
                <div class="slides">

                    <div class="slide active">
                        <img src="images/dok-laksana-1.jpg" alt="Dokumentasi kenaikan tingkat Laksana 1">
                    </div>

                    <div class="slide">
                        <img src="images/dok-laksana-2.jpg" alt="Dokumentasi kenaikan tingkat Laksana 2">
                    </div>

                    <div class="slide">
                        <img src="images/dok-laksana-3.jpg" alt="Dokumentasi kenaikan tingkat Laksana 3">
                    </div>

                    <!-- GANTI: tambah foto lain dengan menyalin blok .slide di atas -->

                </div>

                <button class="prev" aria-label="Foto sebelumnya">&#10094;</button>
                <button class="next" aria-label="Foto berikutnya">&#10095;</button>
                <button class="slide-toggle" aria-label="Hentikan slideshow">&#10073;&#10073;</button>
            </div>

            <p class="slide-counter">
                <span class="slide-counter-current">1</span> / <span class="slide-counter-total">3</span>
            </p>

        </section>

    </div>

    <script src="slider.js"></script>

</html>
